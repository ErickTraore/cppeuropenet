# Interpolation : docker compose --env-file docker-compose.production.env -f docker-compose.yml
services:
  userMediaProfile-backend:
    image: ${COMPOSE_NODE_IMAGE}
    working_dir: /usr/src/app
    command: ["sh", "-c", "${COMPOSE_APP_SHELL_COMMAND}"]
    ports:
      - "${PROD_BIND_HOST}:${PROD_HOST_PORT}:${CONTAINER_APP_PORT}"
    env_file: .env.production
    environment:
      NODE_ENV: ${NODE_ENV}
    volumes:
      - ./:/usr/src/app
      - ./uploads:/usr/src/app/uploads
    restart: unless-stopped
    networks:
      - db-admin-net
    depends_on:
      - userprofile-db

  userprofile-db:
    image: ${COMPOSE_MARIADB_IMAGE}
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - userprofile-db-data:/var/lib/mysql
    ports:
      - "${MARIADB_HOST_PORT}:3306"
    networks:
      db-admin-net:
        aliases:
          - userprofile-db

networks:
  db-admin-net:
    external: true
    name: ${COMPOSE_DB_ADMIN_NET_NAME}

volumes:
  userprofile-db-data:
    external: true
    name: ${COMPOSE_VOLUME_USERPROFILE_DB}
