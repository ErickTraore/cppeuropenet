# Sur le VPS Contabo : /etc/nginx/sites-enabled/api-backends-cppeurope.net.conf
# Routage Host cppeurope.net → backends cppeurope prod (ports 7xxx), staging via snippet.
# Après modification : nginx -t && systemctl reload nginx
#
# Déploiement :
#   scp deploy/contabo/nginx/api-backends-cppeurope.net.conf root@62.171.186.233:/etc/nginx/sites-enabled/api-backends-cppeurope.net.conf
#   scp deploy/contabo/nginx/cppeurope-staging-prefix.conf root@62.171.186.233:/etc/nginx/snippets/cppeurope-staging-prefix.conf
#   ssh root@62.171.186.233 "nginx -t && systemctl reload nginx"

server {
    listen 80;
    server_name cppeurope.net www.cppeurope.net 62.171.186.233;
    client_max_body_size 600M;

    location ~ ^/api/media/(uploadImageProfile|mediaProfile)(/.*)?$ {
        proxy_pass http://localhost:7007/api/user-media-profile/$1$2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/media-locale/(uploadImageProfile|mediaProfile)(/.*)?$ {
        proxy_pass http://localhost:7007/api/user-media-profile/$1$2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/user-media-profile/ {
        proxy_pass http://localhost:7007/api/user-media-profile/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/media/ {
        proxy_pass http://127.0.0.1:7004/api/media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/media-locale/ {
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_pass http://127.0.0.1:7008/api/media-locale/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/presse-generale/ {
        proxy_pass         http://127.0.0.1:7016;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 600M;
    }

    location /api/presse-locale/ {
        proxy_pass         http://localhost:7005/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/uploads/ {
        proxy_pass http://127.0.0.1:7004/api/uploads/;
        proxy_http_version 1.1;
        access_log off;
    }

    location /api/uploads-locale/ {
        proxy_pass http://127.0.0.1:7008/api/uploads-locale/;
        proxy_http_version 1.1;
        access_log off;
    }

    location /mediaprofile/ {
        proxy_pass http://localhost:7007/mediaprofile/;
        proxy_http_version 1.1;
        access_log off;
    }

    location /imagesprofile/ {
        proxy_pass http://localhost:7007/imagesprofile/;
        proxy_http_version 1.1;
        access_log off;
    }

    include /etc/nginx/snippets/cppeurope-staging-prefix.conf;
}
