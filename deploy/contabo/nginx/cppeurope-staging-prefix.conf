# Sur le VPS Contabo : /etc/nginx/snippets/cppeurope-staging-prefix.conf
# Inclus dans api-backends-cppeurope.net.conf via : include /etc/nginx/snippets/cppeurope-staging-prefix.conf;
# CPP Europe — préfixe /cppeurope-staging/ : backends staging (ports 17xxx).

location ~ ^/cppeurope-staging/api/media/(uploadImageProfile|mediaProfile)(/.*)?$ {
    proxy_pass http://127.0.0.1:17007/api/user-media-profile/$1$2;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 600M;
}

location ~ ^/cppeurope-staging/api/media-locale/(uploadImageProfile|mediaProfile)(/.*)?$ {
    proxy_pass http://127.0.0.1:17007/api/user-media-profile/$1$2;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 600M;
}

location /cppeurope-staging/api/media/ {
    proxy_pass http://127.0.0.1:17004/api/media/;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 600M;
}

location /cppeurope-staging/api/uploads/ {
    proxy_pass http://127.0.0.1:17004/api/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    access_log off;
}

location /cppeurope-staging/api/media-locale/ {
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_pass http://127.0.0.1:17006/api/media-locale/;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 600M;
}

location /cppeurope-staging/api/uploads-locale/ {
    proxy_pass http://127.0.0.1:17006/api/uploads-locale/;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    access_log off;
}

location /cppeurope-staging/api/user-media-profile/ {
    proxy_pass http://127.0.0.1:17007/api/user-media-profile/;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 100M;
}

location /cppeurope-staging/mediaprofile/ {
    proxy_pass http://127.0.0.1:17007/mediaprofile/;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    access_log off;
}

location /cppeurope-staging/imagesprofile/ {
    proxy_pass http://127.0.0.1:17007/imagesprofile/;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    access_log off;
}

location /cppeurope-staging/api/presse-generale/ {
    rewrite ^/cppeurope-staging/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:17016;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 600M;
}

location /cppeurope-staging/api/presse-locale/ {
    proxy_pass http://127.0.0.1:17005/api/;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 600M;
}

location /cppeurope-staging/ {
    rewrite ^/cppeurope-staging/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:80;
    proxy_http_version 1.1;
    proxy_set_header Host cppeurope.net;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    client_max_body_size 600M;
}
