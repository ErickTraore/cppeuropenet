# Staging nginx — différences vs prod :
# - location / proxifie vers le conteneur frontend:3000 (pas de fichiers statiques)
# - routes Contabo préfixées /cppeurope-staging
# - /api/home-config → conteneur home-config local (pas Contabo)

server {
    listen 80;
    server_name _;

    # API users (conteneur local)
    location /api/users/ {
        proxy_pass         http://user-backend:7001/api/users/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API presse générale (Contabo staging — préfixe /cppeurope-staging)
    location /api/presse-generale/ {
        proxy_pass         http://62.171.186.233/cppeurope-staging/api/presse-generale/;
        proxy_http_version 1.1;
        proxy_set_header   Host cppeurope.net;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API media (Contabo staging)
    location /api/media/ {
        proxy_pass         http://62.171.186.233/cppeurope-staging/api/media/;
        proxy_http_version 1.1;
        proxy_set_header   Host cppeurope.net;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 600M;
    }

    # API presse locale (Contabo staging)
    location /api/presse-locale/ {
        proxy_pass         http://62.171.186.233/cppeurope-staging/api/presse-locale/;
        proxy_http_version 1.1;
        proxy_set_header   Host cppeurope.net;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 600M;
    }

    # API media locale (Contabo staging)
    location /api/media-locale/ {
        proxy_pass         http://62.171.186.233/cppeurope-staging/api/media-locale/;
        proxy_http_version 1.1;
        proxy_set_header   Host cppeurope.net;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 600M;
    }

    # Fichiers media profile (Contabo staging)
    location /mediaprofile/ {
        proxy_pass         http://62.171.186.233/cppeurope-staging/mediaprofile/;
        proxy_http_version 1.1;
        proxy_set_header   Host cppeurope.net;
        access_log off;
    }

    # Images de profil (Contabo staging)
    location /imagesprofile/ {
        proxy_pass         http://62.171.186.233/cppeurope-staging/imagesprofile/;
        proxy_http_version 1.1;
        proxy_set_header   Host cppeurope.net;
        access_log off;
    }

    location /media-backend/ {
        proxy_pass         http://62.171.186.233/cppeurope-staging/api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host cppeurope.net;
        access_log off;
    }

    # Uploads images et vidéos (Contabo staging)
    location /api/uploads/ {
        proxy_pass         http://62.171.186.233/cppeurope-staging/api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host cppeurope.net;
        access_log off;
    }

    # Uploads presse locale (Contabo staging)
    location /api/uploads-locale/ {
        proxy_pass         http://62.171.186.233/cppeurope-staging/api/uploads-locale/;
        proxy_http_version 1.1;
        proxy_set_header   Host cppeurope.net;
        access_log off;
    }

    # Config page d'accueil (home-config sur Contabo staging — port 7020)
    location /api/home-config {
        proxy_pass         http://62.171.186.233:7020/api/home-config;
        proxy_http_version 1.1;
        proxy_set_header   Host cppeurope.net;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 55m;
    }

    # Frontend (conteneur local — proxy vers server.prod.js)
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
