# File: hostinger-cppeurope/nginx/conf.d/hostinger-cppeurope.conf

server {
    listen 80;
    server_name _;

    # API users
    location /api/users/ {
        proxy_pass         http://user-backend:7001/api/users/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API presse générale (via nginx Contabo port 80 → 127.0.0.1:7016)
    location /api/presse-generale/ {
        proxy_pass         http://62.171.186.233/api/presse-generale/;
        proxy_http_version 1.1;
        proxy_set_header   Host cppeurope.net;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API media (nouveau serveur)
    location /api/media/ {
        proxy_pass         http://62.171.186.233/api/media/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 600M;
    }

    # API presse locale (backend Contabo)
    location /api/presse-locale/ {
        proxy_pass         http://62.171.186.233/api/presse-locale/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 600M;
    }

    # API media locale
    location /api/media-locale/ {
        proxy_pass         http://62.171.186.233/api/media-locale/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 600M;
    }

   # Fichiers media profile (nouveau serveur)
    location /mediaprofile/ {
        proxy_pass         http://62.171.186.233/mediaprofile/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

        # Nouvelles images de profil (nouveau serveur)
    location /imagesprofile/ {
        proxy_pass         http://62.171.186.233/imagesprofile/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

   location /media-backend/ {
        proxy_pass         http://62.171.186.233/api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

   # Uploads (images et vidéos)
    location /api/uploads/ {
        proxy_pass         http://62.171.186.233/api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    # Uploads presse locale
    location /api/uploads-locale/ {
        proxy_pass         http://62.171.186.233/api/uploads-locale/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    # Config page d'accueil (home-config-backend sur Contabo) + upload images
    location /api/home-config {
        proxy_pass         http://62.171.186.233:7020;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 55m;
    }

    # Frontend (proxy vers server.prod.js sur le conteneur frontend:3000)
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
