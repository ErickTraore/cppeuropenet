## File: hostinger-cppeurope/docker-compose.yml 
services:
  user-backend:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - ./user-backend:/usr/src/app
    env_file:
      - ./user-backend/.env.production
    environment:
      NODE_ENV: production
      ALLOWED_ORIGINS: https://cppeurope.net,https://www.cppeurope.net,http://localhost:8082,http://localhost:3000
    command: ["sh", "./wait-for-db.sh", "node", "server.prod.js"]
    depends_on:
      - mariadb
    restart: always
    networks:
      - app-network
    ports:
      - "7001:7001"

  # presse générale : API sur VPS Contabo uniquement (/opt/contabo-cppeurope/…). Pas de volume Hostinger.

  mariadb:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_DATABASE: user_dev_cppeurope_v1
      MARIADB_USER: c
      MARIADB_PASSWORD: CppEurope@2025!
      MARIADB_ROOT_PASSWORD: RootPass@2025!
    volumes:
      - hostinger-cppeurope-db-data:/var/lib/mysql
    ports:
      - "3314:3306"
    networks:
      - app-network

  nginx:
    image: nginx:stable
    depends_on:
      - user-backend
    ports:
      - "8085:80"   # <-- PORT CORRIGÉ
    volumes:
      - ./nginx:/etc/nginx/
      - /etc/letsencrypt:/etc/letsencrypt:ro

  frontend:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - ./frontend:/usr/src/app
    environment:
      NODE_ENV: production
      REACT_APP_USER_API: http://user-backend:7001/api/users
    command: bash -c "npm install && npm run build && npx --yes serve -s build -l 3000"
    ports:
      - "8082:3000"
    restart: always
    networks:
      - app-network

  adminer:
    image: adminer
    restart: always
    ports:
      - "8083:8080"
    depends_on:
      - mariadb
    environment:
      ADMINER_DEFAULT_SERVER: mariadb

volumes:
  hostinger-cppeurope-db-data:

networks:
  app-network:
    driver: bridge
