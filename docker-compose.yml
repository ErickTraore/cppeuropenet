## File: hostinger-cppeurope/docker-compose.yml
## Variables d’interpolation : docker-compose.production.env (voir docker-compose.production.env.example)
## Démarrage : ./scripts/production-compose.sh up -d
services:
  user-backend:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - ./user-backend:/usr/src/app
    env_file:
      - ./user-backend/.env.production
    environment:
      NODE_ENV: ${COMPOSE_USER_BACKEND_NODE_ENV}
      ALLOWED_ORIGINS: ${COMPOSE_USER_BACKEND_ALLOWED_ORIGINS}
    command: ["sh", "./wait-for-db.sh", "node", "server.prod.js"]
    depends_on:
      - mariadb
    restart: always
    networks:
      - app-network

  # presse générale : API sur VPS Contabo uniquement (/opt/contabo-cppeurope/…). Pas de volume Hostinger.

  mariadb:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - hostinger-cppeurope-db-data:/var/lib/mysql
    ports:
      - "${COMPOSE_MARIADB_HOST_PORT}:3306"
    networks:
      - app-network

  home-config:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - ./home-config-backend:/usr/src/app
      - home-config-data:/data
      # better-sqlite3 doit être compilé dans l’image Node du conteneur, pas depuis l’hôte
      - home-config-node-modules:/usr/src/app/node_modules
    env_file:
      - ./user-backend/.env.production
    environment:
      NODE_ENV: ${COMPOSE_HOME_CONFIG_NODE_ENV}
      PORT: ${COMPOSE_HOME_CONFIG_PORT}
      DATA_DIR: ${COMPOSE_HOME_CONFIG_DATA_DIR}
      MAX_UPLOAD_MB: ${COMPOSE_HOME_CONFIG_MAX_UPLOAD_MB}
      ALLOWED_ORIGINS: ${COMPOSE_HOME_CONFIG_ALLOWED_ORIGINS}
    command: bash -c "npm install && node server.js"
    networks:
      - app-network
    restart: always

  nginx:
    image: nginx:stable
    depends_on:
      - user-backend
      - home-config
    ports:
      - "${COMPOSE_NGINX_HOST_PORT}:80"
    volumes:
      - ./nginx:/etc/nginx/
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app-network

  frontend:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - ./frontend:/usr/src/app
    environment:
      NODE_ENV: ${NODE_ENV}
      REACT_APP_USER_API: ${REACT_APP_USER_API}
      USER_BACKEND_HOST: ${USER_BACKEND_HOST}
      USER_BACKEND_PORT: ${USER_BACKEND_PORT}
      HOME_CONFIG_HOST: ${HOME_CONFIG_HOST}
      HOME_CONFIG_PORT: ${HOME_CONFIG_PORT}
      PROXY_UPSTREAM_HOST_HEADER: ${PROXY_UPSTREAM_HOST_HEADER}
      MEDIA_STATIC_HOST: ${MEDIA_STATIC_HOST}
      MEDIA_STATIC_PORT: ${MEDIA_STATIC_PORT}
      MEDIA_HEALTH_PATH: ${MEDIA_HEALTH_PATH}
      PRESSE_MEDIA_GLE_HOST: ${PRESSE_MEDIA_GLE_HOST}
      PRESSE_MEDIA_GLE_PORT: ${PRESSE_MEDIA_GLE_PORT}
      PRESSE_MEDIA_LOC_HOST: ${PRESSE_MEDIA_LOC_HOST}
      PRESSE_MEDIA_LOC_PORT: ${PRESSE_MEDIA_LOC_PORT}
      PRESSE_LOCALE_MSG_HOST: ${PRESSE_LOCALE_MSG_HOST}
      PRESSE_LOCALE_MSG_PORT: ${PRESSE_LOCALE_MSG_PORT}
      PRESSE_GENERALE_HOST: ${PRESSE_GENERALE_HOST}
      PRESSE_GENERALE_PORT: ${PRESSE_GENERALE_PORT}
    command: bash -c "npm install && npm run build && node server.prod.js"
    depends_on:
      - user-backend
      - home-config
    ports:
      - "${COMPOSE_FRONTEND_HOST_PORT}:3000"
    restart: always
    networks:
      - app-network

  adminer:
    image: adminer
    restart: always
    ports:
      - "${COMPOSE_ADMINER_HOST_PORT}:8080"
    depends_on:
      - mariadb
    environment:
      ADMINER_DEFAULT_SERVER: ${COMPOSE_ADMINER_DB_HOST}

volumes:
  hostinger-cppeurope-db-data:
  home-config-data:
  home-config-node-modules:

networks:
  app-network:
    driver: bridge
