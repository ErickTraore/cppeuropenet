# File: hostinger-cppeurope/docker-compose.dev.yml
# Variables : docker-compose.development.env (voir docker-compose.development.env.example)
# Démarrage : ./scripts/dev-compose.sh up -d

services:
  user-backend:
    build: ./user-backend
    working_dir: /usr/src/app
    volumes:
      - ./user-backend:/usr/src/app
    env_file:
      - ./user-backend/.env.development
    environment:
      NODE_ENV: development
      ALLOWED_ORIGINS: ${COMPOSE_USER_BACKEND_ALLOWED_ORIGINS}
      DB_HOST: ${COMPOSE_USER_BACKEND_DB_HOST}
      REACT_APP_MEDIA_API: ${COMPOSE_REACT_APP_MEDIA_API}
      MEDIA_API_CONTABO: ${COMPOSE_MEDIA_API_CONTABO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "npm install && node server.dev.js"
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${COMPOSE_USER_BACKEND_HOST_PORT}:7001"
    networks:
      - user-db-net

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 25s
    volumes:
      - user-db-data:/var/lib/mysql
    ports:
      - "${COMPOSE_MARIADB_HOST_PORT}:3306"
    networks:
      - user-db-net

volumes:
  user-db-data:

networks:
  user-db-net:
    driver: bridge
