# Staging sur le même VPS que la prod : stack isolée (projet Docker cppeurope-staging).
# Base MariaDB = volume et identifiants dédiés (aucune donnée prod).
#
# Multi-VPS : Contabo avec préfixe staging — nginx/staging + CONTABO_PATH_PREFIX (IP / chemins dans docker-compose.staging.env).
# Déployer deploy/contabo-cppeurope-staging-prefix.conf.example sur le VPS Contabo avant de tester.
#
# Prérequis :
#   - user-backend/.env.staging.example → user-backend/.env.staging (secrets, DB, ALLOWED_ORIGINS, JWT)
#   - docker-compose.staging.env.example → docker-compose.staging.env (ports, frontend, préfixe Contabo)
#
# Démarrage :
#   ./scripts/staging-compose.sh up -d
# ou :
#   docker compose --env-file ./user-backend/.env.staging --env-file ./docker-compose.staging.env -f docker-compose.staging.yml -p cppeurope-staging up -d
#
# Accès typique : nginx http://<VPS>:9085  |  frontend direct :9082  |  MariaDB hôte :3315  |  Adminer :9083

services:
  user-backend:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - ./user-backend:/usr/src/app
    env_file:
      - ./user-backend/.env.staging
    environment:
      NODE_ENV: ${NODE_ENV}
      DB_HOST: ${DB_HOST}
    command: bash -c "npm install && sh ./wait-for-db.sh node server.prod.js"
    depends_on:
      - mariadb
    restart: always
    networks:
      - app-network

  mariadb:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - cppeurope-staging-db-data:/var/lib/mysql
    ports:
      - "${COMPOSE_MARIADB_HOST_PORT}:3306"
    networks:
      - app-network

  nginx:
    image: nginx:stable
    depends_on:
      - user-backend
    ports:
      - "${COMPOSE_NGINX_HOST_PORT}:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/staging/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app-network

  frontend:
    image: node:20
    working_dir: /usr/src/app
    volumes:
      - ./frontend:/usr/src/app
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      REACT_APP_USER_API: ${REACT_APP_USER_API:-/api/users}
      REACT_APP_PRESSE_GENERALE_API: ${REACT_APP_PRESSE_GENERALE_API:-/api/presse-generale}
      USER_BACKEND_HOST: ${USER_BACKEND_HOST:-user-backend}
      USER_BACKEND_PORT: ${USER_BACKEND_PORT:-7001}
      HOME_CONFIG_HOST: ${HOME_CONFIG_HOST:-62.171.186.233}
      HOME_CONFIG_PORT: ${HOME_CONFIG_PORT:-80}
      PROXY_UPSTREAM_HOST_HEADER: ${PROXY_UPSTREAM_HOST_HEADER:-cppeurope.net}
      CONTABO_PATH_PREFIX: ${CONTABO_PATH_PREFIX:-/cppeurope-staging}
      MEDIA_STATIC_HOST: ${MEDIA_STATIC_HOST:-62.171.186.233}
      MEDIA_STATIC_PORT: ${MEDIA_STATIC_PORT:-80}
      MEDIA_HEALTH_PATH: ${MEDIA_HEALTH_PATH:-/api/user-media-profile/}
      PRESSE_MEDIA_GLE_HOST: ${PRESSE_MEDIA_GLE_HOST:-62.171.186.233}
      PRESSE_MEDIA_GLE_PORT: ${PRESSE_MEDIA_GLE_PORT:-80}
      PRESSE_MEDIA_LOC_HOST: ${PRESSE_MEDIA_LOC_HOST:-62.171.186.233}
      PRESSE_MEDIA_LOC_PORT: ${PRESSE_MEDIA_LOC_PORT:-80}
      PRESSE_LOCALE_MSG_HOST: ${PRESSE_LOCALE_MSG_HOST:-62.171.186.233}
      PRESSE_LOCALE_MSG_PORT: ${PRESSE_LOCALE_MSG_PORT:-80}
      PRESSE_GENERALE_HOST: ${PRESSE_GENERALE_HOST:-62.171.186.233}
      PRESSE_GENERALE_PORT: ${PRESSE_GENERALE_PORT:-80}
    command: bash -c "npm install && npm run build && node server.prod.js"
    depends_on:
      - user-backend
    ports:
      - "${COMPOSE_FRONTEND_HOST_PORT}:3000"
    restart: always
    networks:
      - app-network

  adminer:
    image: adminer
    restart: always
    ports:
      - "${COMPOSE_ADMINER_HOST_PORT}:8080"
    depends_on:
      - mariadb
    environment:
      ADMINER_DEFAULT_SERVER: ${COMPOSE_ADMINER_DB_HOST}
    networks:
      - app-network

volumes:
  cppeurope-staging-db-data:

networks:
  app-network:
    driver: bridge
