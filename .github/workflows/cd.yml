# CD — déploiement UNIQUEMENT manuel (plus de déploiement automatique à chaque push sur main).
# Exige une confirmation textuelle pour limiter les erreurs et les déploiements non voulus.
name: Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Saisir exactement DEPLOY pour lancer le déploiement"
        required: true
        type: string
      git_ref:
        description: "Branche ou tag Git sur le serveur (ex. main)"
        required: true
        default: main
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: SSH — pull, validation frontend, Docker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Vérifier la confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY" ]; then
            echo "::error::Confirmation invalide. Tu dois saisir exactement DEPLOY."
            exit 1
          fi

      - name: Configurer la clé SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          KEYFILE="$HOME/.ssh/id_ed25519"
          TMP=$(mktemp)
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$TMP"
          sed -i 's/\r$//' "$TMP"
          # PEM : détecter BEGIN même si ligne vide / espace avant (évite faux « ni PEM ni base64 »).
          # Base64 : une ligne ou plusieurs → tout coller sans espaces/retours puis decoder.
          if grep -qE 'BEGIN (OPENSSH|RSA|EC) PRIVATE KEY' "$TMP"; then
            mv "$TMP" "$KEYFILE"
          else
            B64=$(tr -d ' \n\r\t' < "$TMP")
            if [ -z "$B64" ]; then
              echo "::error::DEPLOY_SSH_KEY est vide (environment production)."
              rm -f "$TMP"
              exit 1
            fi
            # -i : ignore les caractères hors alphabet base64 (collage UI / copie depuis navigateur).
            if ! printf '%s' "$B64" | base64 -d -i > "$KEYFILE" 2>/dev/null; then
              echo "::error::DEPLOY_SSH_KEY : une ligne base64 issue de : base64 -w0 ~/.ssh/github_deploy_cppeurope — ou clé PEM complète (BEGIN…END). Vérifie l’environment production."
              rm -f "$TMP"
              exit 1
            fi
            rm -f "$TMP"
          fi
          chmod 600 "$KEYFILE"
          if ! ssh-keygen -y -f "$KEYFILE" >/dev/null 2>&1; then
            echo "::error::Clé privée illisible après écriture. Utilise une ligne base64 : base64 -w0 ~/.ssh/github_deploy_cppeurope"
            exit 1
          fi

      - name: known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Déployer sur le VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PRODUCTION_ENV: ${{ secrets.DEPLOY_PRODUCTION_ENV }}
          GIT_REF: ${{ inputs.git_ref }}
        run: |
          if [ -z "$DEPLOY_PRODUCTION_ENV" ]; then
            echo "::error::Le secret DEPLOY_PRODUCTION_ENV est vide ou absent (environment production)."
            exit 1
          fi

          TMP_ENV=$(mktemp)
          printf '%s\n' "$DEPLOY_PRODUCTION_ENV" > "$TMP_ENV"
          sed -i 's/\r$//' "$TMP_ENV"
          if ! grep -qE '^[A-Z0-9_]+=' "$TMP_ENV"; then
            echo "::error::DEPLOY_PRODUCTION_ENV ne ressemble pas à un fichier .env valide."
            rm -f "$TMP_ENV"
            exit 1
          fi

          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p $(printf '%q' "$DEPLOY_PATH")"
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes "$TMP_ENV" "${DEPLOY_USER}@${DEPLOY_HOST}:$(printf '%q' "$DEPLOY_PATH")/docker-compose.production.env"
          rm -f "$TMP_ENV"

          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail
             cd $(printf '%q' "$DEPLOY_PATH")
             git fetch origin
             git reset --hard $(printf '%q' "origin/$GIT_REF")
             bash ./deploy-with-tests.sh
             ./scripts/production-compose.sh down
             ./scripts/production-compose.sh up -d --build
             echo '-- Attente démarrage user-backend (max 30s)...'
             for i in \$(seq 1 15); do
               ./scripts/production-compose.sh exec -T user-backend echo ok 2>/dev/null && break
               sleep 2
             done
             echo '-- Migrations Sequelize'
             ./scripts/production-compose.sh exec -T user-backend npx sequelize-cli db:migrate"

  prod-smoke:
    name: Post-deploy smoke (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run production smoke gate
        working-directory: frontend
        env:
          PROD_BASE_URL: https://cppeurope.net
          HOSTINGER_FRONTEND_HOST: cppeurope.net
          HOSTINGER_FRONTEND_PORT: "443"
          HOSTINGER_USER_BACKEND_HOST: cppeurope.net
          HOSTINGER_USER_BACKEND_PORT: "443"
          E2E_BACKEND_HOST: cppeurope.net
          E2E_PORT_USER_BACKEND: "443"
          E2E_PORT_PRESSE_GENERALE: "443"
          E2E_PORT_PRESSE_LOCALE: "443"
          E2E_PORT_MEDIA_GLE: "443"
          E2E_PORT_MEDIA_LOCALE: "443"
          CYPRESS_SKIP_E2E_READY_CHECKS: "1"
          CYPRESS_SKIP_E2E_INFRA_GATE: "1"
        run: |
          npm install
          cd ..
          ./scripts/release-check.sh prod-smoke

