name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run deploy-with-tests.sh with E2E (true) or skip E2E (false)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          BRANCH: ${{ github.ref_name }}
          RUN_E2E: ${{ github.event_name == 'workflow_dispatch' && inputs.run_e2e || 'false' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" << EOF
          set -e
          cd "${DEPLOY_PATH}"
          git fetch --all
          git reset --hard "origin/${BRANCH}"

          if [ "${RUN_E2E}" = "true" ]; then
            bash ./deploy-with-tests.sh
          else
            SKIP_E2E=true bash ./deploy-with-tests.sh
          fi

          docker compose down
          docker compose up -d --build
          EOF
