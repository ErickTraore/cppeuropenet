# CD — déploiement UNIQUEMENT manuel (plus de déploiement automatique à chaque push sur main).
# Exige une confirmation textuelle pour limiter les erreurs et les déploiements non voulus.
name: Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Saisir exactement DEPLOY pour lancer le déploiement"
        required: true
        type: string
      git_ref:
        description: "Branche ou tag Git sur le serveur (ex. main)"
        required: true
        default: main
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: SSH — pull, validation frontend, Docker
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Vérifier la confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY" ]; then
            echo "::error::Confirmation invalide. Tu dois saisir exactement DEPLOY."
            exit 1
          fi

      - name: Configurer la clé SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Déployer sur le VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GIT_REF: ${{ inputs.git_ref }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; cd $(printf '%q' "$DEPLOY_PATH"); git fetch origin; git reset --hard $(printf '%q' "origin/$GIT_REF"); bash ./deploy-with-tests.sh; docker compose down; docker compose up -d --build"
