name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          CI: "true"
          REACT_APP_USER_API: http://localhost:8082/api/users
          REACT_APP_PRESSE_GENERALE_API: http://localhost:8082/api/presse-generale
          REACT_APP_PRESSE_LOCALE_API: http://localhost:8082/api/presse-locale
          REACT_APP_MEDIA_API: http://localhost:8082/api/media
          REACT_APP_PROFILE_MEDIA_API: http://localhost:8082/api/user-media-profile
          REACT_APP_PRESSE_LOCALE_MEDIA_API: http://localhost:8082/api/media-locale
          REACT_APP_BASE_URL: http://localhost:8082
          REACT_APP_PRESSE_LOCALE_BASE_URL: http://localhost:8082
          REACT_APP_PRESSE_LOCALE_SITE_KEY: cppEurope
          REACT_APP_SESSION_EXPIRY_WARNING: "60"
        run: npm run build

  e2e-smoke:
    name: Cypress smoke
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Start frontend
        env:
          REACT_APP_USER_API: http://localhost:8082/api/users
          REACT_APP_PRESSE_GENERALE_API: http://localhost:8082/api/presse-generale
          REACT_APP_PRESSE_LOCALE_API: http://localhost:8082/api/presse-locale
          REACT_APP_MEDIA_API: http://localhost:8082/api/media
          REACT_APP_PROFILE_MEDIA_API: http://localhost:8082/api/user-media-profile
          REACT_APP_PRESSE_LOCALE_MEDIA_API: http://localhost:8082/api/media-locale
          REACT_APP_BASE_URL: http://localhost:8082
          REACT_APP_PRESSE_LOCALE_BASE_URL: http://localhost:8082
          REACT_APP_PRESSE_LOCALE_SITE_KEY: cppEurope
          REACT_APP_SESSION_EXPIRY_WARNING: "60"
        run: npm start &

      - name: Wait for app
        run: npx wait-on http://localhost:3000

      - name: Run Cypress smoke spec
        run: npx cypress run --spec "cypress/e2e/cppeuropeNet.cy.js" --config baseUrl=http://localhost:3000
